# Bezant backend on the VPS. The host's existing nginx reverse-proxies
# api.bezant.trade → this container and terminates TLS (certbot). The frontend
# is on Vercel. Copy deploy.env.example to .env, fill it in, then:
#   docker compose up -d --build
#
# NOTE: single-instance ONLY (embedded SQLite + polling indexer). Do not scale.

services:
  backend:
    build:
      context: ./backend
    env_file: .env
    environment:
      DB_PATH: /app/data/arc.db
    # Published to localhost only — nginx on the host proxies it; not public.
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - backend-data:/app/data
    restart: unless-stopped

volumes:
  backend-data:
